apiVersion: apps/v1
kind: Deployment
metadata:
  name: machine-a-tron
  namespace: {{ include "machine-a-tron.namespace" . }}
  labels:
    app: {{ include "machine-a-tron.name" . }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "machine-a-tron.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "machine-a-tron.name" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: machine-a-tron
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/machine-a-tron/bin/machine-a-tron
          env:
            - name: FORGE_ROOT_CA_PATH
              value: /var/run/secrets/spiffe.io/ca.crt
            - name: CLIENT_CERT_PATH
              value: /var/run/secrets/spiffe.io/tls.crt
            - name: CLIENT_KEY_PATH
              value: /var/run/secrets/spiffe.io/tls.key
            - name: MACHINE_A_TRON_CONFIG_PATH
              value: {{ .Values.config.mountPath }}
          ports:
            - name: redfish
              containerPort: {{ .Values.service.redfishPort }}
            - name: ssh
              containerPort: {{ .Values.service.sshTargetPort }}
          readinessProbe:
            tcpSocket:
              port: redfish
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            - name: config
              mountPath: /opt/machine-a-tron/config
              readOnly: true
            - name: persist
              mountPath: /tmp/machine-a-tron-data
      volumes:
        - name: spiffe
          secret:
            secretName: {{ .Values.certificate.secretName }}
        - name: config
          configMap:
            name: machine-a-tron-config
        - name: persist
          emptyDir: {}
