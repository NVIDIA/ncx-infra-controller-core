kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: carbide-api
  namespace: {{ include "carbide-api.namespace" . }}
  labels:
    {{- include "carbide-api.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["create"]
  # This is needed when DPF v1 is enabled and a static `dpf.bfb_url`
  # isn't configured (meaning dpf::resolve_bfb_url tries to read the
  # `carbide-pxe-external` Service IP to build a URL). Without this
  # rule, carbide-api will fail with a 403 from the k8s apiserver.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: carbide-api
  namespace: {{ include "carbide-api.namespace" . }}
  labels:
    {{- include "carbide-api.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: carbide-api
subjects:
  - kind: ServiceAccount
    name: carbide-api
    namespace: {{ include "carbide-api.namespace" . }}
