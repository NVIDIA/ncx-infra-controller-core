# =============================================================================
# EKS Test Override — Carbide Umbrella Chart
# Target: vmaas-eks-usw2-dev2
# =============================================================================
# Consolidated values for all 9 sub-charts.
# Usage:
#   helm upgrade --install carbide ../carbide \
#     -n $NAMESPACE --create-namespace \
#     -f values/carbide.yaml
# =============================================================================

## ---------------------------------------------------------------------------
## Global (propagated to all sub-charts automatically)
## ---------------------------------------------------------------------------
global:
  image:
    repository: nvcr.io/0837451325059433/carbide-dev/nvmetal-carbide
    tag: v2025.12.30-rc1-0-6-gebc11e732
  ## Both pull secrets here — covers the 9 sub-charts that read global.imagePullSecrets.
  ## K8s tries each in order; having an extra unused secret is harmless.
  imagePullSecrets:
    - name: nvcr-carbide-dev
    - name: nvcr-nvidian-nvforge

## ---------------------------------------------------------------------------
## carbide-api
## ---------------------------------------------------------------------------
carbide-api:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  siteConfig:
    enabled: true
    carbideApiSiteConfig: |
      dhcp_servers=[]
      route_servers=[]
      initial_domain_name="helmtest.local"
      sitename="helm-test"
      attestation_enabled = false

      [pools.lo-ip]
      type = "ipv4"
      ranges = [{ start = "10.200.0.1", end = "10.200.0.254" }]

      [pools.vlan-id]
      type = "integer"
      ranges = [{ start = "100", end = "200" }]

      [pools.vni]
      type = "integer"
      ranges = [{ start = "1024500", end = "1024600" }]

      [pools.vpc-vni]
      type = "integer"
      ranges = [{ start = "0", end = "50" }]

      [networks.admin]
      type = "admin"
      prefix = "10.200.1.0/24"
      gateway = "10.200.1.1"
      mtu = 9000
      reserve_first = 5
  hostname: "carbide-test.dev2.local"
  ## Vault and DB ConfigMaps managed by prereqs chart — leave empty here.
  ## Populate these only when NOT using prereqs chart (e.g. production with operators).
  # vaultClusterInfo:
  #   VAULT_SERVICE: "https://vault.example.com"
  #   FORGE_VAULT_MOUNT: "secrets"
  #   FORGE_VAULT_PKI_MOUNT: "forgeca"
  # databaseConfig:
  #   DB_HOST: "postgresql.forge-system.svc.cluster.local"
  #   DB_PORT: "5432"
  #   DB_NAME: "carbide"

## ---------------------------------------------------------------------------
## carbide-dhcp
## ---------------------------------------------------------------------------
carbide-dhcp:
  config:
    enabled: true
    keaConfigJson: |
      {
        "Dhcp4": {
          "interfaces-config": {
            "interfaces": ["eth0"],
            "dhcp-socket-type": "udp"
          },
          "lease-database": {
            "type": "memfile",
            "lfc-interval": 3600
          },
          "match-client-id": false,
          "authoritative": true,
          "renew-timer": 900,
          "rebind-timer": 1800,
          "valid-lifetime": 3600,
          "hooks-libraries": [
            {
              "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp.so",
              "parameters": {
                "carbide-api-url": "https://carbide-api.__NAMESPACE__.svc.cluster.local:1079",
                "carbide-metrics-endpoint": "[::]:1089",
                "carbide-nameservers": "127.0.0.1",
                "carbide-ntpserver": "127.0.0.1",
                "carbide-provisioning-server-ipv4": "127.0.0.1"
              }
            }
          ],
          "subnet4": [
            {
              "subnet": "0.0.0.0/0",
              "pools": [
                {
                  "pool": "0.0.0.0-255.255.255.255"
                }
              ]
            }
          ],
          "loggers": [
            { "name": "kea-dhcp4", "severity": "DEBUG", "debuglevel": 20, "output_options": [{ "output": "stdout" }] },
            { "name": "kea-dhcp4.hosts", "severity": "DEBUG", "debuglevel": 99, "output_options": [{ "output": "stdout" }] },
            { "name": "kea-dhcp4.callouts", "severity": "DEBUG", "debuglevel": 99, "output_options": [{ "output": "stdout" }] },
            { "name": "kea-dhcp4.dhcpsrv", "severity": "DEBUG", "debuglevel": 99, "output_options": [{ "output": "stdout" }] },
            { "name": "kea-dhcp4.hooks", "severity": "DEBUG", "debuglevel": 99, "output_options": [{ "output": "stdout" }] },
            { "name": "kea-dhcp4.carbide-rust", "severity": "INFO", "output_options": [{ "output": "stdout" }] }
          ]
        }
      }

## ---------------------------------------------------------------------------
## carbide-dns
## ---------------------------------------------------------------------------
carbide-dns:

## ---------------------------------------------------------------------------
## carbide-hardware-health
## ---------------------------------------------------------------------------
carbide-hardware-health: {}

## ---------------------------------------------------------------------------
## carbide-ntp — disabled by default; enable for environments without external NTP
## ---------------------------------------------------------------------------
carbide-ntp:
  enabled: true
  image:
    repository: dockurr/chrony
    tag: latest
  env:
    NTP_EXTERNAL_SERVERS: "time1.google.com,time2.google.com"
    NTP_DIRECTIVES: "ratelimit"

## ---------------------------------------------------------------------------
## carbide-pxe
## ---------------------------------------------------------------------------
carbide-pxe: {}

## ---------------------------------------------------------------------------
## carbide-ssh-console-rs
## NOTE: This chart reads .Values.imagePullSecrets (not global).
## ---------------------------------------------------------------------------
carbide-ssh-console-rs:
  imagePullSecrets:
    - name: nvcr-carbide-dev
  lokiLogCollector:
    image:
      repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
      tag: "0.81.0"

## ---------------------------------------------------------------------------
## unbound
## NOTE: Uses its own image/exporterImage. Reads .Values.imagePullSecrets (not global).
## ---------------------------------------------------------------------------
unbound:
  image:
    repository: nvcr.io/nvidian/nvforge/unbound
    tag: "3b089e6"
  exporterImage:
    repository: nvcr.io/nvidian/nvforge/unbound_exporter
    tag: "7561033"
  imagePullSecrets:
    - name: nvcr-nvidian-nvforge
  localConfig:
    access_control.conf: |
      server:
          access-control: 0.0.0.0/0 allow
    extended_statistics.conf: |
      server:
          extended-statistics: yes
    verbosity.conf: |
      server:
          verbosity: 1
    forge_local_unknowndomain.conf: |
      local-zone: "unknowndomain." static
      local-data: "unknowndomain. 10800 IN NS localhost."
      local-data: "unknowndomain. 10800 IN SOA localhost. nobody.invalid. 1 3600 1200 604800 10800"
    forwarders.conf: |
      forward-zone:
          name: "."
          forward-addr: 8.8.8.8
          forward-addr: 8.8.4.4
